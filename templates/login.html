<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Köşebaşı Market — Platform Girişi</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .auth-card { width: 100%; max-width: 440px; background: var(--paper-raised); border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); overflow: hidden; }
  .auth-header { background: var(--market-green); color: #F2F4EE; padding: 24px 20px; text-align: center; }
  .auth-header .brand { font-family: var(--font-display); font-weight: 900; font-size: 24px; }
  .auth-header .brand span { color: var(--crate-amber); }
  .tabs { display: flex; border-bottom: 1px solid var(--line); background: var(--paper); }
  .tab-btn { flex: 1; padding: 12px; font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--ink-soft); cursor: pointer; border: none; background: transparent; }
  .tab-btn.active { background: var(--paper-raised); color: var(--market-green-dark); border-bottom: 2px solid var(--crate-amber); }
  .form-content { padding: 24px 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 5px; }
  .form-control { width: 100%; padding: 10px 12px; border: 1px solid var(--line-strong); border-radius: 4px; font-family: var(--font-body); font-size: 14px; background: var(--paper); color: var(--ink); }
  .role-selector { display: flex; gap: 8px; margin-top: 5px; }
  .role-option { flex: 1; padding: 8px; border: 1px solid var(--line-strong); border-radius: 4px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; }
  .role-option.selected { background: var(--market-green); color: #F2F4EE; border-color: var(--market-green-dark); }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="auth-card">
  <div class="auth-header">
    <div class="brand">Köşe<span>başı</span></div>
    <div class="mono" style="font-size: 12px; opacity: 0.8; margin-top: 4px;">Antakya Mahalle Marketleri Platformu</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="sekmeDegistir('login')">Giriş Yap</button>
    <button class="tab-btn" onclick="sekmeDegistir('register')">Yeni Hesap</button>
  </div>

  <div class="form-content">
    <div id="form-login">
      <div class="form-group"><label>E-Posta Adresi</label><input type="email" id="login-email" class="form-control" placeholder="sumerler@kosebasi.com"></div>
      <div class="form-group"><label>Şifre</label><input type="password" id="login-sifre" class="form-control" placeholder="••••••••"></div>
      <button class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 15px; margin-top: 10px;" onclick="girisYap()">Giriş Yap</button>
    </div>

    <div id="form-register" class="hidden">
      <div class="form-group">
        <label>Hesap Tipi</label>
        <div class="role-selector">
          <div class="role-option selected" data-rol="musteri" onclick="rolSec('musteri')">🛒 Müşteri</div>
          <div class="role-option" data-rol="market" onclick="rolSec('market')">🏪 Market</div>
          <div class="role-option" data-rol="kurye" onclick="rolSec('kurye')">🛵 Kurye</div>
        </div>
      </div>

      <div class="form-group"><label>E-Posta Adresi</label><input type="email" id="reg-email" class="form-control" placeholder="ornek@kosebasi.com"></div>
      <div class="form-group"><label>Şifre</label><input type="password" id="reg-sifre" class="form-control" placeholder="••••••••"></div>
      <div class="form-group"><label id="lbl-ad">Ad Soyad / Market Adı</label><input type="text" id="reg-ad" class="form-control" placeholder="Örn: Köşebaşı Sümerler Şubesi"></div>
      <div class="form-group"><label>Telefon</label><input type="tel" id="reg-telefon" class="form-control" placeholder="05XX XXX XX XX"></div>

      <div class="form-group" id="grp-adres"><label>Adres</label><input type="text" id="reg-adres" class="form-control" placeholder="Sümerler Mah. Harbiye Cad. Antakya"></div>

      <!-- Konum & Yarıçap -->
      <div id="grp-konum">
        <div style="display:flex; gap:8px;">
          <div class="form-group" style="flex:1;"><label>Enlem (Lat)</label><input type="number" step="0.0001" id="reg-lat" class="form-control" value="36.1950"></div>
          <div class="form-group" style="flex:1;"><label>Boylam (Lon)</label><input type="number" step="0.0001" id="reg-lon" class="form-control" value="36.1450"></div>
        </div>
      </div>

      <div class="form-group hidden" id="grp-yaricap">
        <label id="lbl-yaricap">Servis Teslimat Yarıçapı (km)</label>
        <input type="number" step="0.5" id="reg-yaricap" class="form-control" value="5.0">
      </div>

      <button class="btn btn-amber" style="width: 100%; padding: 12px; font-size: 15px; margin-top: 6px;" onclick="kayitOl()">Hesabı Oluştur</button>
    </div>
  </div>
</div>

<script>
let secilenRol = 'musteri';

function sekmeDegistir(sekme) {
  document.querySelectorAll('.tab-btn')[0].classList.toggle('active', sekme === 'login');
  document.querySelectorAll('.tab-btn')[1].classList.toggle('active', sekme === 'register');
  document.getElementById('form-login').classList.toggle('hidden', sekme !== 'login');
  document.getElementById('form-register').classList.toggle('hidden', sekme !== 'register');
}

function rolSec(rol) {
  secilenRol = rol;
  document.querySelectorAll('.role-option').forEach(el => el.classList.toggle('selected', el.dataset.rol === rol));
  const lblYaricap = document.getElementById('lbl-yaricap');
  const grpYaricap = document.getElementById('grp-yaricap');

  if (rol === 'market') {
    document.getElementById('lbl-ad').textContent = 'Market Şube Adı';
    document.getElementById('grp-adres').classList.remove('hidden');
    grpYaricap.classList.remove('hidden');
    lblYaricap.textContent = 'Maksimum Teslimat Yarıçapı (km)';
  } else if (rol === 'kurye') {
    document.getElementById('lbl-ad').textContent = 'Ad Soyad';
    document.getElementById('grp-adres').classList.add('hidden');
    grpYaricap.classList.remove('hidden');
    lblYaricap.textContent = 'Çalışma/Hizmet Yarıçapı (km)';
  } else {
    document.getElementById('lbl-ad').textContent = 'Ad Soyad';
    document.getElementById('grp-adres').classList.remove('hidden');
    grpYaricap.classList.add('hidden');
  }
}

async function girisYap() {
  const email = document.getElementById('login-email').value.trim();
  const sifre = document.getElementById('login-sifre').value.trim();
  if (!email || !sifre) return alert("E-posta ve şifre giriniz.");

  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, sifre })
  });
  const data = await res.json();
  if (!res.ok) return alert(data.hata);

  localStorage.setItem('aktif_kullanici', JSON.stringify(data.kullanici));
  window.location.href = data.kullanici.rol === 'market' ? '/market' : data.kullanici.rol === 'kurye' ? '/kurye' : '/musteri';
}

async function kayitOl() {
  const payload = {
    email: document.getElementById('reg-email').value.trim(),
    sifre: document.getElementById('reg-sifre').value.trim(),
    rol: secilenRol,
    ad: document.getElementById('reg-ad').value.trim(),
    telefon: document.getElementById('reg-telefon').value.trim(),
    adres: document.getElementById('reg-adres').value.trim(),
    konum_lat: parseFloat(document.getElementById('reg-lat').value),
    konum_lon: parseFloat(document.getElementById('reg-lon').value),
    yaricap_km: parseFloat(document.getElementById('reg-yaricap').value || '5.0')
  };

  const res = await fetch('/api/auth/register', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (!res.ok) return alert(data.hata);

  alert("Kayıt başarılı! Giriş yapabilirsiniz.");
  sekmeDegistir('login');
}
</script>
</body>
</html>
