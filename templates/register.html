<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yeni Hesap Kaydı — Nihat Market</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --migros-orange: #FF7B00;
    --migros-dark: #0F172A;
    --bg-page: #F8FAFC;
    --border-color: #E2E8F0;
    --text-main: #1E293B;
    --text-muted: #64748B;
    --success: #10B981;
    --danger: #DC2626;
  }

  * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
  body {
    background:
      radial-gradient(circle at top left, rgba(255,123,0,0.13), transparent 32%),
      linear-gradient(180deg, #FFFFFF 0%, var(--bg-page) 100%);
    color: var(--text-main);
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 30px 20px;
  }

  .brand-header { text-align: center; margin-bottom: 24px; }
  .brand-logo { font-size: 30px; font-weight: 800; color: var(--migros-orange); text-decoration: none; letter-spacing: -0.7px; }
  .brand-logo span { color: var(--migros-dark); }
  .brand-subtitle { font-size: 14px; color: var(--text-muted); font-weight: 600; margin-top: 6px; }

  .register-card {
    background: #FFFFFF;
    width: 100%;
    max-width: 560px;
    border: 1px solid var(--border-color);
    border-radius: 22px;
    padding: 34px;
    box-shadow: 0 22px 60px rgba(15,23,42,0.08);
  }

  .form-title { font-size: 24px; font-weight: 800; margin: 0 0 6px 0; color: var(--migros-dark); letter-spacing:-0.4px; }
  .form-desc { font-size: 14px; color: var(--text-muted); margin: 0 0 24px 0; line-height: 1.5; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .full-width { grid-column: 1 / -1; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 800;
    color: var(--text-main);
    text-transform: uppercase;
    margin-bottom: 7px;
    letter-spacing: 0.3px;
  }

  .form-control {
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid var(--border-color);
    border-radius: 11px;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
    background: #FAFCFF;
  }
  .form-control:focus { border-color: var(--migros-orange); background: #FFF; box-shadow: 0 0 0 4px rgba(255,123,0,0.10); }
  textarea.form-control { resize: vertical; min-height: 78px; }

  .phone-row { display: grid; grid-template-columns: 116px 1fr; gap: 10px; }

  .btn-submit {
    width: 100%;
    background: var(--migros-orange);
    color: #FFF;
    font-weight: 800;
    font-size: 15px;
    padding: 15px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 12px;
  }
  .btn-submit:hover { background: #E66E00; transform: translateY(-1px); }
  .btn-submit:disabled { background: #CBD5E1; cursor: not-allowed; transform: none; }

  .alert-box {
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 18px;
    display: none;
    text-align: center;
  }
  .alert-error { background: #FEF2F2; color: var(--danger); border: 1px solid #FECACA; }
  .alert-success { background: #ECFDF5; color: #059669; border: 1px solid #A7F3D0; }

  .footer-links { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-color); text-align: center; font-size: 13px; }
  .footer-links a { color: var(--migros-orange); font-weight: 800; text-decoration: none; }
  .footer-links a:hover { text-decoration: underline; }

  .security-badge {
    margin-top: 18px;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    background: #F1F5F9;
    padding: 9px 12px;
    border-radius: 8px;
    font-weight: 700;
  }

  @media (max-width: 560px) {
    .register-card { padding: 24px; }
    .form-grid { grid-template-columns: 1fr; }
    .phone-row { grid-template-columns: 105px 1fr; }
  }
</style>
</head>
<body>

<div class="brand-header">
  <div class="brand-logo">Nihat<span>Market</span></div>
  <div class="brand-subtitle">Mahalle alışverişinizi kolaylaştıran dijital bakkal</div>
</div>

<div class="register-card">
  <h1 class="form-title">Yeni Hesap Oluştur</h1>
  <p class="form-desc">Adınızı, iletişim bilgilerinizi ve adres tarifinizi girin; alışverişe hemen başlayın.</p>

  <div id="bildirim-kutu" class="alert-box"></div>

  <form id="register-form" onsubmit="kayitOl(event)">
    <div class="form-grid">
      <div class="form-group">
        <label for="ad">Ad</label>
        <input type="text" id="ad" class="form-control" placeholder="Örn: Ahmet" required autocomplete="given-name">
      </div>

      <div class="form-group">
        <label for="soyad">Soyad</label>
        <input type="text" id="soyad" class="form-control" placeholder="Örn: Yılmaz" required autocomplete="family-name">
      </div>

      <div class="form-group full-width">
        <label for="email">E-posta Adresi</label>
        <input type="email" id="email" class="form-control" placeholder="ornek@mail.com" required autocomplete="email">
      </div>

      <div class="form-group full-width">
        <label for="telefon">Telefon Numarası</label>
        <div class="phone-row">
          <select id="ulke_kodu" class="form-control">
            <option value="+90" selected>🇹🇷 +90</option>
          </select>
          <input type="tel" id="telefon" class="form-control" placeholder="5XX XXX XX XX" required autocomplete="tel-national" inputmode="tel">
        </div>
      </div>

      <div class="form-group">
        <label for="sifre">Şifre</label>
        <input type="password" id="sifre" class="form-control" placeholder="En az 6 karakter" required minlength="6" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label for="sifre_tekrar">Şifre Tekrar</label>
        <input type="password" id="sifre_tekrar" class="form-control" placeholder="Şifrenizi doğrulayın" required minlength="6" autocomplete="new-password">
      </div>

      <div class="form-group full-width">
        <label for="adres_tarifi">Adres Tarifi</label>
        <textarea id="adres_tarifi" class="form-control" placeholder="Mahalle, sokak, bina, kat/daire ve bakkalın kolay bulması için kısa tarif..." required autocomplete="street-address"></textarea>
      </div>
    </div>

    <button type="submit" class="btn-submit" id="submit-btn">Hesabımı Oluştur ➔</button>
  </form>

  <div class="security-badge">Market/bakkal yetkili hesabı yalnızca sistem yöneticisi tarafından oluşturulur.</div>

  <div class="footer-links">
    Zaten hesabınız var mı? <br>
    <a href="/login" style="display:inline-block; margin-top:6px;">🔑 Giriş ekranına dön</a>
  </div>
</div>

<script>
function telefonuNormalizeEt(telefon) {
  return telefon.replaceAll(' ', '').replaceAll('-', '').replaceAll('(', '').replaceAll(')', '').replace(/^0+/, '');
}

async function kayitOl(event) {
  event.preventDefault();

  const adInput = document.getElementById('ad');
  const soyadInput = document.getElementById('soyad');
  const emailInput = document.getElementById('email');
  const ulkeKoduInput = document.getElementById('ulke_kodu');
  const telefonInput = document.getElementById('telefon');
  const sifreInput = document.getElementById('sifre');
  const sifreTekrarInput = document.getElementById('sifre_tekrar');
  const adresTarifiInput = document.getElementById('adres_tarifi');

  const submitBtn = document.getElementById('submit-btn');
  const bildirimKutu = document.getElementById('bildirim-kutu');

  bildirimKutu.style.display = 'none';
  bildirimKutu.className = 'alert-box';

  const ad = adInput.value.trim();
  const soyad = soyadInput.value.trim();
  const adSoyad = `${ad} ${soyad}`.trim();
  const telefon = `${ulkeKoduInput.value}${telefonuNormalizeEt(telefonInput.value)}`;

  if (!ad || !soyad) {
    bildirimKutu.textContent = 'Lütfen ad ve soyad bilgilerinizi girin.';
    bildirimKutu.classList.add('alert-error');
    bildirimKutu.style.display = 'block';
    return;
  }

  if (sifreInput.value !== sifreTekrarInput.value) {
    bildirimKutu.textContent = 'Girdiğiniz şifreler birbiriyle uyuşmuyor!';
    bildirimKutu.classList.add('alert-error');
    bildirimKutu.style.display = 'block';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Hesabınız oluşturuluyor...';

  try {
    const registerRes = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: emailInput.value.trim(),
        sifre: sifreInput.value,
        ad: ad,
        soyad: soyad,
        ad_soyad: adSoyad,
        telefon: telefon,
        adres: adresTarifiInput.value.trim(),
        adres_tarifi: adresTarifiInput.value.trim()
      })
    });

    const registerData = await registerRes.json();

    if (registerRes.ok) {
      bildirimKutu.textContent = '🎉 Kayıt başarılı! Giriş yapılıyor...';
      bildirimKutu.classList.add('alert-success');
      bildirimKutu.style.display = 'block';
      submitBtn.style.background = '#10B981';

      const loginRes = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: emailInput.value.trim(),
          sifre: sifreInput.value
        })
      });

      const loginData = await loginRes.json();

      setTimeout(() => {
        window.location.href = loginData.yonlendir || '/musteri';
      }, 700);
    } else {
      bildirimKutu.textContent = registerData.hata || 'Kayıt işlemi sırasında bir sorun oluştu.';
      bildirimKutu.classList.add('alert-error');
      bildirimKutu.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Hesabımı Oluştur ➔';
    }
  } catch (error) {
    bildirimKutu.textContent = 'Sunucu bağlantısı kurulamadı. Lütfen tekrar deneyin.';
    bildirimKutu.classList.add('alert-error');
    bildirimKutu.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Hesabımı Oluştur ➔';
  }
}
</script>
</body>
</html>
